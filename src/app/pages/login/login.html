<div class="container">
  <h2>Connexion</h2>

  <form (ngSubmit)="login()">
    <input type="email" placeholder="Email" [(ngModel)]="email" name="email" required>
    <input type="password" placeholder="Mot de passe" [(ngModel)]="password" name="password" required>

    <button type="submit">Se connecter</button>
  </form>

  <p>
    Pas encore inscrit ?
    <a routerLink="/register">Créer un compte</a>
  </p>
</div>
