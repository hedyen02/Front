<div class="container">
  <h2>Inscription to our app</h2>

  <form (ngSubmit)="register()">

    <input type="text"
           placeholder="Nom"
           [(ngModel)]="user.nom"
           name="nom"
           required>

    <input type="text"
           placeholder="Prénom"
           [(ngModel)]="user.prenom"
           name="prenom"
           required>

    <input type="email"
           placeholder="Email"
           [(ngModel)]="user.email"
           name="email"
           required>

    <input type="password"
           placeholder="Mot de passe"
           [(ngModel)]="user.password"
           name="password"
           required>

    <input type="password"
           placeholder="Confirmer le mot de passe"
           [(ngModel)]="user.confirmPassword"
           name="confirmPassword"
           required>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <button type="submit">S'inscrire</button>
  </form>

  <p>
    Déjà inscrit ?
    <a routerLink="/login">Se connecter</a>
  </p>
</div>
